      --model_name ${predict.model_name}
      --device ${predict.device}
      --target_sr ${predict.target_sr}
      --espeak_library "${predict.espeak_library}"
    deps:
      - scripts/predict_phonemes.py
      - data/manifests/en/noisy_snr_0.jsonl
      - data/processed/en/noisy/0
    params:
      - project.root
      - predict.model_name
      - predict.device
      - predict.target_sr
      - predict.espeak_library
    outs:
      - data/manifests/en/pred_snr_0.jsonl

  evaluate_per_en_snr20:
    cmd: >-
      .\.venv\Scripts\python.exe scripts/evaluate_per.py
      --input_manifest data/manifests/en/pred_snr_20.jsonl
      --output_metrics results/en/per_snr_20.json
    deps:
      - scripts/evaluate_per.py
      - data/manifests/en/pred_snr_20.jsonl
    metrics:
      - results/en/per_snr_20.json

  evaluate_per_en_snr10:
